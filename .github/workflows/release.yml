name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Check tag matches plugin version
        run: |
          version=$(sed -n 's/^version = "\(.*\)"$/\1/p' build.gradle.kts)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::Tag v$tag does not match version $version in build.gradle.kts"
            exit 1
          fi

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" build/distributions/*.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
